services:
  - type: web
    name: FinGuardAI-web
    env: python
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 4 --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        value: "" # set this in Render dashboard to a secure random value
